<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>SSE Test</title>
<style>body{font-family:monospace;padding:20px;background:#111;color:#0f0;}
#log{border:1px solid #333;padding:10px;max-height:400px;overflow-y:auto;}
.e{margin:2px 0;padding:4px;background:#1a1a1a;border-left:3px solid #0f0;}
</style></head>
<body>
<h2>SSE Monitor</h2>
<div id="status">Connecting...</div>
<div id="log"></div>
<script>
const log = document.getElementById('log');
const status = document.getElementById('status');
function addEntry(text, color) {
  const d = document.createElement('div');
  d.className = 'e';
  d.style.borderLeftColor = color || '#0f0';
  d.textContent = new Date().toLocaleTimeString() + ' | ' + text;
  log.prepend(d);
}
const es = new EventSource('/admin/api/events/stream');
es.onopen = () => { status.textContent = 'Connected'; status.style.color = '#0f0'; addEntry('SSE connected'); };
es.onmessage = (e) => { addEntry('EVENT: ' + e.data.substring(0, 200), '#ff0'); };
es.onerror = () => { status.textContent = 'Error/reconnecting...'; status.style.color = '#f00'; addEntry('Error, retrying...', '#f00'); };
</script></body></html>
